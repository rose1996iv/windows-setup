name: CI/CD — Lint & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: PowerShell Lint ───────────────────────────────────────
  lint-ps1:
    name: 🔍 PowerShell Syntax Check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse install.ps1
        shell: pwsh
        run: |
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "${{ github.workspace }}/install.ps1",
            [ref]$null,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
          Write-Host "✓ install.ps1 — no syntax errors" -ForegroundColor Green

      - name: Parse WindowsSetup_Pro.ps1
        shell: pwsh
        run: |
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "${{ github.workspace }}/WindowsSetup_Pro.ps1",
            [ref]$null,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
          Write-Host "✓ WindowsSetup_Pro.ps1 — no syntax errors" -ForegroundColor Green

  # ── Job 2: HTML Validation ──────────────────────────────────────
  lint-html:
    name: 🌐 HTML Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate index.html exists and is non-empty
        run: |
          if [ ! -s "index.html" ]; then
            echo "❌ index.html is missing or empty"
            exit 1
          fi
          echo "✓ index.html found ($(wc -c < index.html) bytes)"

  # ── Job 3: Deploy to Vercel ─────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [lint-ps1, lint-html]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
