name: CI/CD — Lint & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: PowerShell Lint ───────────────────────────────────────
  lint-ps1:
    name: 🔍 PowerShell Syntax Check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse PowerShell scripts for syntax errors
        shell: pwsh
        run: |
          $files = @('install.ps1', 'WindowsSetup_Pro.ps1')
          $allOk = $true
          foreach ($file in $files) {
            $content = Get-Content $file -Raw
            $parsed = [System.Management.Automation.Language.Parser]::ParseInput(
              $content, [ref]$null, [ref]$null
            )
            $errCheck = $null
            [System.Management.Automation.Language.Parser]::ParseInput(
              $content,
              [ref]$null,
              [ref]$errCheck
            )
            if ($errCheck.Count -gt 0) {
              Write-Host "FAIL: $file has $($errCheck.Count) syntax error(s)" -ForegroundColor Red
              $errCheck | ForEach-Object { Write-Host "  $_" -ForegroundColor Red }
              $allOk = $false
            } else {
              Write-Host "OK: $file" -ForegroundColor Green
            }
          }
          if (-not $allOk) { exit 1 }

  # ── Job 2: HTML Validation ──────────────────────────────────────
  lint-html:
    name: 🌐 HTML Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate index.html
        run: |
          if [ ! -s "index.html" ]; then
            echo "index.html is missing or empty"
            exit 1
          fi
          echo "index.html OK: $(wc -c < index.html) bytes"

  # ── Job 3: Deploy to Vercel ─────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [lint-ps1, lint-html]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
