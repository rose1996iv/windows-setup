name: CI/CD — Lint & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: PowerShell Lint ───────────────────────────────────────
  lint-powershell:
    name: 🔍 PowerShell Syntax Check
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate WindowsSetup_Pro.ps1
        shell: pwsh
        run: |
          Write-Host "Checking WindowsSetup_Pro.ps1..." -ForegroundColor Cyan
          [System.Collections.Generic.List[System.Management.Automation.Language.ParseError]]$errors = @()
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$env:GITHUB_WORKSPACE\WindowsSetup_Pro.ps1",
            [ref]$null,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            Write-Host "FAIL - $($errors.Count) syntax error(s):" -ForegroundColor Red
            foreach ($e in $errors) {
              Write-Host "  Line $($e.Extent.StartLineNumber): $($e.Message)" -ForegroundColor Red
            }
            exit 1
          }
          Write-Host "PASS - WindowsSetup_Pro.ps1 has no syntax errors" -ForegroundColor Green

      - name: Validate install.ps1
        shell: pwsh
        run: |
          Write-Host "Checking install.ps1..." -ForegroundColor Cyan
          [System.Collections.Generic.List[System.Management.Automation.Language.ParseError]]$errors = @()
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "$env:GITHUB_WORKSPACE\install.ps1",
            [ref]$null,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            Write-Host "FAIL - $($errors.Count) syntax error(s):" -ForegroundColor Red
            foreach ($e in $errors) {
              Write-Host "  Line $($e.Extent.StartLineNumber): $($e.Message)" -ForegroundColor Red
            }
            exit 1
          }
          Write-Host "PASS - install.ps1 has no syntax errors" -ForegroundColor Green

  # ── Job 2: HTML Validation ──────────────────────────────────────
  lint-html:
    name: 🌐 HTML Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate index.html
        run: |
          if [ ! -s "index.html" ]; then
            echo "index.html is missing or empty"
            exit 1
          fi
          echo "index.html OK: $(wc -c < index.html) bytes"

  # ── Job 3: Deploy to Vercel ─────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [lint-powershell, lint-html]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --token=$VERCEL_TOKEN --yes
